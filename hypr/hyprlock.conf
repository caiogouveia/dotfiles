$font = JetBrainsMono Nerd Font

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    # path = /home/khan/Imagens/Wallpapers/moon-venus.jpg   # altere se preferir outro
    path = /home/khan/Imagens/Wallpapers/jolly_roger_dual.jpg
    color = rgba(0, 0, 0, 1.0)
    blur_passes = 2 # 0 disables blurring
}

# Igual ao waybar/fuzzel/mako: fundo preto translúcido, borda laranja, cantos arredondados
input-field {
    monitor =
    size = 250, 60
    rounding = 15
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(ffa000d9)
    inner_color = rgba(0, 0, 0, 0.65)
    check_color = rgba(ffa000ee)
    fail_color = rgba(ff0000e6)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    font_family = $font
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 64
    font_family = $font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = Hello, $USER
    color = rgba(255, 255, 255, 1.0)
    font_size = 20
    font_family = $font
    position = 0, 0
    halign = center
    valign = center
}
