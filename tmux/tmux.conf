# Prefix keyh
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# UTF-8
set -gq status-utf8 on
set -gq utf8 on

# Start indices at 1
set -g base-index 1
set -g pane-base-index 1

# Window splitting
bind "\\" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows in current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file $HOME/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"


# Window Navigation
# unbind p
# bind p previous-window
# bind -r M-Left select-window -t :-
# bind -r M-Right select-window -t :+

# Window management
bind , command-prompt "rename-window '%%'"

# Pane navigation
# bind -n M-Left select-pane -L
# bind -n M-Right select-pane -R
# bind -n M-Up select-pane -U
# bind -n M-Down select-pane -D

# Pane cycling
unbind o
bind ^A select-pane -t:.+

# Pane resizing
bind-key -r h resize-pane -R 25
bind-key -r j resize-pane -D 25
bind-key -r k resize-pane -U 25
bind-key -r l resize-pane -L 25

set-option -g update-environment "LANG LC_CTYPE"

# General settings
set -sg escape-time 1
set -g allow-rename on
set -g mouse on
set -g focus-events on
set-window-option -g mode-keys vi

# Terminal settings
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Visual notifications
set -g visual-activity on
set -g visual-bell on
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Theme configuration
set -g @theme_main "darkred"
set -g @theme_bg "white"
set -g @theme_text_light "white"
set -g @theme_text_dark "black"

# Mode styling
setw -g clock-mode-colour "#{@theme_main}"
setw -g mode-style "fg=#{@theme_text_light} bg=#{@theme_main} bold"

# Pane styling
set -g pane-border-style "fg=#{@theme_text_light}"
set -g pane-active-border-style "fg=#{@theme_main}"

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#{@theme_main} bg=#{@theme_bg} bold"
set -g status-left "#[fg=#{@theme_text_light} bg=#{@theme_text_dark} bold]  #h • #S#(cd #{pane_current_path} 2>/dev/null && git rev-parse --is-inside-work-tree >/dev/null 2>&1 && echo \" • 🌿 $(git branch --show-current)\")  "
set -g status-left-length 60
set -g status-right ' ⏱ #(uptime | sed -E "s/.*up +([^,]+),.*/\1/") │ %d/%m/%Y - %H:%M '
set -g status-right-style "fg=#{@theme_main} bg=#{@theme_bg} bold"

# Window status styling
setw -g window-status-current-style "fg=#{@theme_text_light} bg=#{@theme_main} bold"
setw -g window-status-style "fg=#{@theme_main} bg=#{@theme_bg}"
setw -g window-status-current-format ' #I #W #F '
setw -g window-status-format ' #I #W #F '
setw -g window-status-separator '|'

# Message styling
set -g message-style "fg=#{@theme_main} bg=#{@theme_bg} bold"

# tmux-sessionizer
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

bind-key -r M-0 run-shell "tmux neww tmux-sessionizer -s 0"
bind-key -r M-1 run-shell "tmux neww tmux-sessionizer -s 1"
bind-key -r M-2 run-shell "tmux neww tmux-sessionizer -s 2"
bind-key -r M-3 run-shell "tmux neww tmux-sessionizer -s 3"

# Inicializa sessão com 3 janelas nomeadas
set-hook -g session-created "rename-window vim; new-window -n run; new-window -n zsh"
